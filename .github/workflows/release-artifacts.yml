name: Release Artifacts

on:
  release:
    types: [published, prereleased, released]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Derive version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          if [[ ! "$tag" =~ ^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be semver (for example v1.2.3 or 1.2.3): $tag" >&2
            exit 1
          fi
          clean="${tag#v}"
          echo "TAG=$tag" >> "$GITHUB_ENV"
          echo "CLEAN_VERSION=$clean" >> "$GITHUB_ENV"

      - name: Build artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/evr-net-monitor_${CLEAN_VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOWORK=off \
            go build -trimpath -ldflags "-s -w -X main.Version=${TAG}" -o "$out" .
          echo "ASSET_PATH=$out" >> "$GITHUB_ENV"

      - name: Upload immutable workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: evr-net-monitor-${{ matrix.goos }}-${{ matrix.goarch }}-${{ env.CLEAN_VERSION }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error
          overwrite: false

      - name: Attach artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${TAG}" "${ASSET_PATH}" --repo "${{ github.repository }}"
